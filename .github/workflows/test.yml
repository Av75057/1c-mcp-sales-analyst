name: Test
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          pip install -e ".[dev]"
          pip install plotly pandas scikit-learn numpy joblib pillow kaleido 2>/dev/null || true
      - name: Run tests (non-admin)
        run: USE_MOCK_DATA=true python -m pytest tests/ --ignore=tests/test_admin.py --ignore=tests/test_charts.py --ignore=tests/test_deepseek_client.py -v --tb=short
      - name: Run admin tests
        run: USE_MOCK_DATA=true python -m pytest tests/test_admin.py -v --tb=short
      - name: Coverage report
        run: USE_MOCK_DATA=true python -m pytest tests/ --cov=src --cov=web --cov-report=term-missing --cov-report=html --tb=short 2>&1 | tail -20
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
