name: Test
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq tesseract-ocr poppler-utils 2>/dev/null || true
      - name: Install Python deps
        run: |
          pip install -e ".[dev]" 2>&1 | tail -3
          pip install plotly pandas 2>&1 | tail -3
      - name: Create data dirs
        run: mkdir -p data/sent_insights models_cache
      - name: List tests
        run: python -m pytest tests/ --collect-only -q 2>&1 | head -30
      - name: Test
        run: USE_MOCK_DATA=true python -m pytest tests/test_mock_client.py tests/test_tools.py tests/test_c1_client.py tests/test_deepseek_client.py tests/test_insights.py tests/integration/ -v --tb=short 2>&1
