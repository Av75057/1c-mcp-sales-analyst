name: Test
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]" 2>&1 | tail -5
      - name: Test mock
        run: USE_MOCK_DATA=true python -m pytest tests/test_mock_client.py -v --tb=long 2>&1
