name: Test
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr tesseract-ocr-rus pdftotext 2>/dev/null || true
      - name: Install Python deps
        run: |
          pip install -e ".[dev,web]"
          pip install plotly pandas kaleido 2>/dev/null || true
      - name: Create data dirs
        run: mkdir -p data/sent_insights models_cache static/charts
      - name: Test
        run: USE_MOCK_DATA=true python -m pytest tests/ --ignore=tests/test_charts.py -v 2>&1
