name: Test
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -e ".[dev]" && pip install plotly pandas scikit-learn numpy joblib
      - name: Test
        run: USE_MOCK_DATA=true python -m pytest tests/test_mock_client.py tests/test_c1_client.py tests/test_insights.py tests/test_tools.py tests/test_abc_xyz.py tests/test_docparser.py tests/test_whatif_scenarios.py tests/test_charts.py -v --tb=short 2>&1
