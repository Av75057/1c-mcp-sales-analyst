{% extends "base.html" %}
{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-md-3 col-lg-2" style="min-width:240px">
            <div class="d-flex gap-1 mb-2">
                <button class="btn btn-primary btn-sm flex-grow-1" onclick="newSession()">+ Новый чат</button>
                <button class="btn btn-outline-secondary btn-sm" onclick="toggleSearch()" title="Поиск">🔍</button>
            </div>
            <div id="searchBlock" class="mb-2 d-none">
                <input class="form-control form-control-sm" id="searchInput" placeholder="Поиск по сообщениям..." oninput="debounceSearch()">
                <div id="searchResults" class="mt-1 small" style="max-height:200px;overflow-y:auto"></div>
            </div>
            <div id="sessionList" class="list-group list-group-flush" style="max-height: 65vh; overflow-y: auto;"></div>
        </div>
        <div class="col-md-9 col-lg-10">
            <div id="chatHeader" class="d-none mb-2">
                <div class="d-flex align-items-center gap-2">
                    <input class="form-control form-control-sm" id="sessionTitle" style="max-width:300px;font-weight:bold" onchange="renameSession()">
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteCurrentSession()" title="Удалить сессию">🗑</button>
                    <button class="btn btn-sm btn-outline-secondary" onclick="exportSession()" title="Экспорт JSON">📥</button>
                    <button class="btn btn-sm btn-outline-success" onclick="saveToLibrary()" title="Сохранить в библиотеку" id="saveToLibBtn" style="display:none">💾 Сохранить</button>
                    <span class="text-secondary small ms-auto" id="usageDisplay"></span>
                </div>
            </div>
            <div id="chatMessages" class="mb-3" style="max-height: 55vh; overflow-y: auto; padding: 0.5rem; border: 1px solid #2d3139; border-radius: 8px;"></div>
            <div id="loadingIndicator" class="text-center py-2 d-none">
                <div class="spinner-border spinner-border-sm text-primary"></div>
                <span class="text-secondary ms-2">AI печатает...</span>
            </div>
            <div class="input-group">
                <input class="form-control" id="chatInput" placeholder="Задайте вопрос..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}">
                <button class="btn btn-primary" onclick="sendMsg()"><i class="bi bi-send"></i></button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
let currentSessionId = null;
let sessions = [];
let searchTimeout = null;
let lastChart = null; // для кнопки "Сохранить в библиотеку"

(async function() {
    await loadSessions();
    if (sessions.length === 0) await newSession();
    else selectSession(sessions[0].id);
})();

async function api(path, opts = {}) {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 120000);
    try {
        const r = await fetch(path, { signal: controller.signal, credentials: 'include', headers: {'Content-Type': 'application/json', ...(opts.headers || {})}, ...opts });
        if (!r.ok) { const e = await r.text(); throw new Error(e); }
        return r.json();
    } finally {
        clearTimeout(timeout);
    }
}

// === Sessions ===
async function loadSessions() {
    try { const d = await api('/api/chat/sessions'); sessions = d.sessions || []; renderSessions(); } catch(e) { console.error(e); }
}

function renderSessions() {
    const el = document.getElementById('sessionList');
    el.innerHTML = sessions.map(s => `
        <a class="list-group-item list-group-item-action d-flex justify-content-between align-items-center ${s.id === currentSessionId ? 'active' : ''}" href="#"
           onclick="selectSession('${s.id}')">
            <div style="flex:1;min-width:0">
                <div style="font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(s.title)}</div>
                <small class="text-secondary">${s.messages_count || 0} msg</small>
            </div>
            <button class="btn btn-sm text-danger" onclick="event.stopPropagation();deleteSession('${s.id}')" title="Удалить">×</button>
        </a>
    `).join('');
}

async function newSession() {
    const d = await api('/api/chat/sessions', { method: 'POST', body: '{}' });
    sessions.unshift({id: d.id, title: d.title, messages_count: 0, last_message_preview: ''});
    renderSessions();
    selectSession(d.id);
}

async function selectSession(id) {
    currentSessionId = id;
    renderSessions();
    document.getElementById('chatMessages').innerHTML = '';
    document.getElementById('usageDisplay').textContent = '';
    document.getElementById('chatHeader').classList.remove('d-none');
    const s = sessions.find(x => x.id === id);
    document.getElementById('sessionTitle').value = s ? s.title : '';
    try {
        const d = await api(`/api/chat/sessions/${id}/messages?page=1&limit=200`);
        renderMessages(d.messages || []);
        const el = document.getElementById('chatMessages');
        el.scrollTop = el.scrollHeight;
    } catch(e) { console.error(e); }
}

function renameSession() {
    const title = document.getElementById('sessionTitle').value;
    if (!title || !currentSessionId) return;
    fetch('/api/chat/sessions/' + currentSessionId, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({title}) }).catch(()=>{});
    const s = sessions.find(x => x.id === currentSessionId);
    if (s) s.title = title;
    renderSessions();
}

function deleteCurrentSession() {
    if (!currentSessionId || !confirm('Удалить сессию?')) return;
    deleteSession(currentSessionId);
}

async function deleteSession(id) {
    await api('/api/chat/sessions/' + id, { method: 'DELETE' });
    sessions = sessions.filter(s => s.id !== id);
    if (id === currentSessionId) {
        currentSessionId = null;
        document.getElementById('chatHeader').classList.add('d-none');
        if (sessions.length) selectSession(sessions[0].id);
        else document.getElementById('chatMessages').innerHTML = '<div class="text-center text-secondary py-5">Создайте новый чат</div>';
    }
    renderSessions();
}

async function exportSession() {
    if (!currentSessionId) return;
    const d = await api('/api/chat/sessions/' + currentSessionId + '/export');
    const blob = new Blob([JSON.stringify(d, null, 2)], {type:'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'chat_export.json'; a.click();
    URL.revokeObjectURL(a.href);
}

// === Messages ===
function renderMessages(messages) {
    const el = document.getElementById('chatMessages');
    el.innerHTML = messages.map(m => {
        const isUser = m.role === 'user';
        let chartImg = '';
        const chartCall = (m.tool_calls || []).find(t => (t.tool_name || t.name) === 'create_chart' && t.result?.image_base64);
        if (chartCall) chartImg = '<div class="mt-2"><img src="data:image/png;base64,' + chartCall.result.image_base64 + '" style="max-width:100%;border-radius:8px"></div>';
        return `<div class="d-flex mb-3 ${isUser ? 'justify-content-end' : ''}">
            <div class="${isUser ? 'bg-primary text-white' : 'bg-dark text-light'} p-3 rounded" style="max-width:80%">
                ${isUser ? escapeHtml(m.content) : renderMarkdown(m.content)}
                ${m.tool_calls?.length ? '<div class="mt-2 pt-2 border-top border-secondary">🔧 ' + m.tool_calls.map(t => '<span class="badge bg-info me-1">' + (t.tool_name || t.name || '?') + '</span>').join('') + '</div>' : ''}
                ${chartImg}
                <div class="mt-1 small text-secondary">${new Date(m.created_at).toLocaleTimeString()}${m.tokens_used ? ' · ' + m.tokens_used + ' tokens' : ''}${m.response_time_ms ? ' · ' + (m.response_time_ms/1000).toFixed(1)+'s' : ''}</div>
            </div>
        </div>`;
    }).join('');
}

async function sendMsg() {
    const input = document.getElementById('chatInput');
    const content = input.value.trim();
    if (!content) return;
    if (!currentSessionId) { await newSession(); }
    input.value = '';
    document.getElementById('loadingIndicator').classList.remove('d-none');

    const el = document.getElementById('chatMessages');
    el.innerHTML += `<div class="d-flex justify-content-end mb-3"><div class="bg-primary text-white p-3 rounded" style="max-width:80%;white-space:pre-wrap">${escapeHtml(content)}</div></div>`;
    el.scrollTop = el.scrollHeight;

    try {
        const d = await api(`/api/chat/sessions/${currentSessionId}/messages`, { method: 'POST', body: JSON.stringify({content}) });
        document.getElementById('loadingIndicator').classList.add('d-none');

        let toolHtml = '';
        if (d.tool_calls?.length) {
            const badges = d.tool_calls.map(t => '<span class="badge bg-info me-1">' + (t.name || t.tool_name || '?') + '</span>').join('');
            toolHtml = '<div class="mt-2 pt-2 border-top border-secondary">🤖 Инструменты: ' + badges + '</div>';

            // Chart display
            const chartCall = d.tool_calls.find(t => t.name === 'create_chart' && t.result?.image_base64);
            if (chartCall) {
                toolHtml += '<div class="mt-2"><img src="data:image/png;base64,' + chartCall.result.image_base64 + '" style="max-width:100%;border-radius:8px"></div>';
                // Сохраняем для кнопки "Сохранить в библиотеку"
                lastChart = { toolCall: chartCall, answer: d.answer };
                document.getElementById('saveToLibBtn').style.display = 'inline-block';
            }
        }
        el.innerHTML += `<div class="d-flex mb-3"><div class="bg-dark text-light p-3 rounded" style="max-width:80%">${renderMarkdown(d.answer)}${toolHtml}</div></div>`;
        el.scrollTop = el.scrollHeight;

        const usage = d.usage || {};
        document.getElementById('usageDisplay').textContent = `💰 ${usage.prompt_tokens || 0} in / ${usage.completion_tokens || 0} out`;

        await loadSessions();
        const s = sessions.find(x => x.id === currentSessionId);
        if (s) document.getElementById('sessionTitle').value = s.title;
    } catch(e) {
        document.getElementById('loadingIndicator').classList.add('d-none');
        el.innerHTML += `<div class="d-flex mb-3"><div class="bg-danger text-white p-3 rounded">❌ Ошибка: ${escapeHtml(e.message)}</div></div>`;
    }
}

// === Search ===
function toggleSearch() {
    const el = document.getElementById('searchBlock');
    el.classList.toggle('d-none');
    if (!el.classList.contains('d-none')) document.getElementById('searchInput').focus();
}

function debounceSearch() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(doSearch, 300);
}

async function doSearch() {
    const q = document.getElementById('searchInput').value.trim();
    const el = document.getElementById('searchResults');
    if (!q) { el.innerHTML = ''; return; }
    try {
        const d = await api('/api/chat/search?q=' + encodeURIComponent(q) + '&limit=20');
        el.innerHTML = d.results?.length
            ? d.results.slice(0,10).map(r => `<div class="p-1 border-bottom border-secondary" style="cursor:pointer" onclick="selectSession('${r.session_id}')">🔍 <span class="text-info">${escapeHtml(r.session_title || '')}</span>: ${escapeHtml((r.content || '').substring(0,80))}</div>`).join('')
            : '<div class="text-secondary">Ничего не найдено</div>';
    } catch(e) { el.innerHTML = '<div class="text-danger">Ошибка поиска</div>'; }
}

function escapeHtml(s) { if (!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Simple markdown renderer for tables and formatting
function renderMarkdown(text) {
    if (!text) return '';
    let html = escapeHtml(text);
    // Tables: | Header | ... |
    html = html.replace(/\n\|(.+)\|/g, (m) => {
        const cells = m.slice(1, -1).split('|').map(c => c.trim());
        if (cells.every(c => /^[-:\s]+$/.test(c))) return '<tr class="d-none">';
        return '<tr><td>' + cells.join('</td><td>') + '</td></tr>';
    });
    html = html.replace(/<tr class="d-none"><\/tr>/g, '');
    // Wrap consecutive table rows in <table>
    html = html.replace(/((?:<tr>.*?<\/tr>\n?)+)/g, '<table class="table table-sm table-bordered mb-2">$1</table>');
    // Bold
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Italic
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    // Line breaks
    html = html.replace(/\n/g, '<br>');
    return html;
}

// Сохранение последнего графика из AI Чата в библиотеку
async function saveToLibrary() {
    if (!lastChart || !lastChart.toolCall) { alert('Нет графика для сохранения'); return; }
    const title = prompt('Название дашборда:', lastChart.toolCall.args?.title || 'График из чата');
    if (!title) return;
    const tagsInput = prompt('Теги (через запятую):', 'чат');
    const tags = tagsInput ? tagsInput.split(',').map(t => t.trim()).filter(Boolean) : ['чат'];
    const chartConfig = {
        chart_type: lastChart.toolCall.args?.chart_type || 'bar',
        title: title,
        x_axis: { field: 'x', label: 'X', type: 'category' },
        y_axis: { field: 'y', label: 'Y', type: 'category' },
        series: [{ name: 'Значение', field: 'y', color: '#5470c6' }],
        onec_query: { entity: 'Document.РеализацияТоваровУслуг', fields: ['Сумма'], period: 'last_30_days' },
    };
    const chartItem = {
        id: 'c' + Date.now(),
        title: title,
        chart_config: chartConfig,
        data: [],
        position: { x: 0, y: 0, w: 6, h: 4 },
        filter_bindings: [],
    };
    const r = await fetch('/api/v2/dashboards', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, description: 'Сохранён из AI Чата', tags, charts: [chartItem] }),
    });
    if (r.ok) {
        alert('✅ Дашборд сохранён в библиотеку!');
        document.getElementById('saveToLibBtn').style.display = 'none';
    } else {
        alert('❌ Ошибка сохранения');
    }
}
</script>
{% endblock %}
