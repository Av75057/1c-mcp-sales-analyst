<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вход — 1C Аналитик</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #111318; display: flex; align-items: center; min-height: 100vh; }
        .login-card { max-width: 400px; width: 100%; margin: 0 auto; }
        .card { border: 1px solid #2d3139; background: #1a1d23; }
        .form-control { background: #22262e; border: 1px solid #2d3139; color: #e5e7eb; }
        .form-control:focus { background: #22262e; border-color: #2563eb; color: #fff; box-shadow: 0 0 0 2px #2563eb33; }
        .btn-primary { background: #2563eb; border: none; }
        .btn-primary:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <div class="login-card p-4">
        <div class="card p-4">
            <h4 class="text-center mb-3">📊 1C Аналитик</h4>
            <p class="text-secondary text-center small mb-4">Вход в систему</p>
            <div id="errorMsg" class="alert alert-danger d-none"></div>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Имя пользователя</label>
                    <input type="text" class="form-control" id="username" required autocomplete="username">
                </div>
                <div class="mb-3">
                    <label class="form-label">Пароль</label>
                    <input type="password" class="form-control" id="password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary w-100">Войти</button>
            </form>
        </div>
    </div>
    <script>
    document.getElementById('loginForm').onsubmit = async function(e) {
        e.preventDefault();
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const err = document.getElementById('errorMsg');
        err.classList.add('d-none');
        const r = await fetch('/api/auth/login', {
            method:'POST',
            headers:{'Content-Type':'application/x-www-form-urlencoded'},
            body:'username='+encodeURIComponent(user)+'&password='+encodeURIComponent(pass)
        });
        if (r.ok) {
            window.location.href = '/';
        } else {
            const data = await r.json();
            err.textContent = data.detail || 'Ошибка входа';
            err.classList.remove('d-none');
        }
    };
    </script>
</body>
</html>
