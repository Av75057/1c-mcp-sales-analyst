<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>1C Аналитик</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root { --sidebar-width: 240px; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; }
        .wrapper { display: flex; min-height: 100vh; }
        .sidebar {
            width: var(--sidebar-width);
            background: #1a1d23;
            padding: 0;
            position: fixed; top: 0; left: 0; bottom: 0;
            z-index: 100;
        }
        .sidebar .nav-link {
            color: #9ca3af; padding: 12px 20px; border-radius: 0;
            border-left: 3px solid transparent; transition: all .15s;
        }
        .sidebar .nav-link:hover { color: #fff; background: #22262e; }
        .sidebar .nav-link.active { color: #fff; background: #2563eb22; border-left-color: #2563eb; }
        .sidebar .nav-link i { width: 22px; margin-right: 8px; }
        .content { margin-left: var(--sidebar-width); flex: 1; padding: 24px; }
        .card { border: 1px solid #2d3139; background: #1a1d23; }
        .card-title { color: #9ca3af; font-size: .85rem; text-transform: uppercase; letter-spacing: .5px; }
        .stat-value { font-size: 1.8rem; font-weight: 700; }
        .table { --bs-table-bg: transparent; --bs-table-color: #e5e7eb; }
        .table th { border-bottom-color: #2d3139; color: #9ca3af; font-weight: 500; }
        .badge-critical { background: #ef4444; }
        .badge-warning { background: #f59e0b; }
        .badge-info { background: #3b82f6; }
        pre { background: #111318; padding: 12px; border-radius: 8px; }
        .insight-card { border-left: 4px solid; transition: transform .1s; }
        .insight-card:hover { transform: translateX(4px); }
        .insight-critical { border-left-color: #ef4444; }
        .insight-warning { border-left-color: #f59e0b; }
        .insight-info { border-left-color: #3b82f6; }
        @media (max-width: 768px) {
            .sidebar { width: 60px; }
            .sidebar .nav-link span { display: none; }
            .content { margin-left: 60px; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <nav class="sidebar pt-3">
            <div class="px-3 mb-4">
                <h6 class="text-white fw-bold">📊 1C Аналитик</h6>
                <small class="text-secondary">v1.0 · AI-powered</small>
            </div>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link {{ 'active' if page == 'dashboard' }}" href="/"><i class="bi bi-grid"></i><span>Дашборд</span></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {{ 'active' if page == 'stock' }}" href="/stock"><i class="bi bi-box-seam"></i><span>Остатки</span></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {{ 'active' if page == 'sales' }}" href="/sales"><i class="bi bi-graph-up-arrow"></i><span>Продажи</span></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {{ 'active' if page == 'chat' }}" href="/chat"><i class="bi bi-chat-dots"></i><span>AI Чат</span></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {{ 'active' if page == 'whatif' }}" href="/whatif"><i class="bi bi-magic"></i><span>What-If</span></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {{ 'active' if page == 'insights' }}" href="/insights"><i class="bi bi-lightbulb"></i><span>Инсайты</span></a>
                </li>
            </ul>
            <div class="position-absolute bottom-0 start-0 end-0 p-3">
                <small class="text-secondary">{{ settings.__class__.__name__ if False else "1C:УНФ + DeepSeek" }}</small>
            </div>
        </nav>
        <main class="content">
            {% block content %}{% endblock %}
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
